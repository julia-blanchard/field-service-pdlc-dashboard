name: Update PDLC Dashboard

on:
  schedule:
    # Runs daily at 6 AM PT (14:00 UTC, 13:00 UTC during DST)
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli

      - name: Authenticate with Salesforce
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --alias org62 --set-default
          rm sfdx_auth.txt

      - name: Fetch Phase 0 data from Google Sheets
        env:
          GOOGLE_SHEETS_DATA: ${{ secrets.GOOGLE_SHEETS_DATA }}
        run: |
          echo "Phase 0 fetch requires Google Sheets API - skipping for now"
          echo "Using existing Phase 0 data from last manual sync"

      - name: Fetch Phase 2 execution data from GUS
        run: |
          python3 fetch_execution_data.py

      - name: Fetch teams data from GUS
        run: |
          python3 fetch_teams_data.py || echo "Teams data fetch failed, using cached"

      - name: Rebuild GitHub Pages static site
        run: |
          python3 sync_to_github_pages.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add docs/data/*.json docs/index.html
          git diff --staged --quiet || git commit -m "Daily dashboard update - $(date +'%Y-%m-%d %H:%M %Z') [skip ci]"
          git push
